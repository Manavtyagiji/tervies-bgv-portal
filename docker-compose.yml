services:
  mongo:
    image: mongo:7
    container_name: tervies-mongo-local
    restart: always
    volumes:
      - mongo_local_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: tervies-backend-local
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/reports:/app/reports

  frontend:
    build:
      context: ./frontend
    container_name: tervies-frontend-local
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: tervies-nginx-local
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  mongo_local_data: